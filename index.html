<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Widget Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #c0392b;
            --bg: #000;
            --panel: #0d0d0d;
            --text: #aab8cc;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Сетка на фоне как в твоем примере */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                linear-gradient(rgba(192,57,43,.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(192,57,43,.07) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: -1;
        }

        .carousel {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .widget {
            display: none;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        .widget.active {
            display: block;
        }

        /* Стили для Часов */
        .time-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 80px;
            color: #e8e8e8;
            text-shadow: 0 0 20px rgba(192,57,43, 0.4);
        }

        .date-display {
            font-family: 'Share Tech Mono', monospace;
            font-size: 20px;
            color: var(--accent);
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Стрелочки */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            color: rgba(255,255,255, 0.1);
            font-size: 50px;
            cursor: pointer;
            transition: all 0.3s;
            padding: 20px;
            user-select: none;
        }

        .nav-btn:hover {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }

        .prev { left: -80px; }
        .next { right: -80px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .widget-title {
            font-family: 'Share Tech Mono', monospace;
            font-size: 14px;
            color: #444;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }
		
		/* Контейнер-окошко для флагов */
.flag-window {
    background: #0d0d0d; /* Цвет фона как в твоем примере */
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    margin-top: 25px;
    width: 320px;
    margin-left: auto;
    margin-right: auto;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.flag-container {
    max-height: 150px; /* Высота до появления прокрутки */
    overflow-y: auto;
    padding: 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--accent) transparent;
}

/* Стилизация полосы прокрутки для Chrome/Edge */
.flag-container::-webkit-scrollbar { width: 3px; }
.flag-container::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

/* Каждая строка флага */
.flag-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 12px;
    background: rgba(255, 255, 255, 0.02);
    margin-bottom: 4px;
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    border-left: 2px solid transparent;
    transition: all 0.2s;
}

.flag-row:hover {
    background: rgba(192, 57, 43, 0.05);
    border-left: 2px solid var(--accent);
}

.flag-label {
    color: #444; /* Темно-серый для названия флага */
}

.flag-time {
    color: #e8e8e8; /* Светлый для времени */
    letter-spacing: 1px;
}
		
    </style>
</head>
<body>
<audio id="timerSound" src="alert.mp3" preload="auto"></audio>
<audio id="swStartSound" src="startSW.mp3" preload="auto"></audio>

    <div class="carousel">
        <button class="nav-btn prev" onclick="changeWidget(-1)">&#10094;</button>
        
        <div class="widget active" id="w0">
            <div class="widget-title">// SYSTEM_TIME</div>
            <div class="time-display" id="clock">00:00:00</div>
            <div class="date-display" id="date">-- -- ----</div>
        </div>

<div class="widget" id="w1">
    <div class="widget-title">// SYSTEM_TIMER_v1.0</div>
    
<div class="timer-inputs" id="timerInputs">
    <input type="number" id="hr" placeholder="00" 
           oninput="if (this.value.length > 2) this.value = this.value.slice(0, 2);">
    <span>:</span>
    <input type="number" id="min" placeholder="00" 
           oninput="if (this.value.length > 3) this.value = this.value.slice(0, 3);">
    <span>:</span>
    <input type="number" id="sec" placeholder="00" 
           oninput="if (this.value.length > 3) this.value = this.value.slice(0, 3);">
</div>

    <div class="time-display" id="timerDisplay" style="display: none;">00:00:00</div>
    
    <div class="timer-controls">
        <button id="startBtn" class="ctrl-btn" onclick="startTimer()">//START.TIMER</button>
        <button id="stopBtn" class="ctrl-btn" style="display: none;" onclick="stopTimer()">//STOP.TIMER</button>
        <button id="resumeBtn" class="ctrl-btn" style="display: none;" onclick="startTimer()">//PLAY</button>
        <button id="resetBtn" class="ctrl-btn" style="display: none;" onclick="resetTimer()">//RESET</button>
    </div>
</div>

<style>
    /* Стили для инпутов таймера */
    .timer-inputs {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        margin-bottom: 20px;
    }

    .timer-inputs input {
        background: #111;
        border: 1px solid #222;
        color: #e8e8e8;
        font-family: 'Share Tech Mono', monospace;
        font-size: 40px;
        width: 70px;
        text-align: center;
        border-radius: 4px;
        outline: none;
    }

    .timer-inputs input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 10px rgba(192,57,43, 0.2);
    }

    .timer-inputs span {
        font-size: 30px;
        color: #333;
    }

    /* Снимаем стрелочки у инпутов */
    input::-webkit-outer-spin-button,
    input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    .timer-controls {
        display: flex;
        justify-content: center;
        gap: 15px;
        margin-top: 20px;
    }

    .ctrl-btn {
        background: transparent;
        border: 1px solid var(--accent);
        color: var(--accent);
        font-family: 'Share Tech Mono', monospace;
        padding: 8px 20px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
        border-radius: 4px;
    }

    .ctrl-btn:hover {
        background: rgba(192,57,43, 0.1);
        box-shadow: 0 0 10px rgba(192,57,43, 0.3);
    }
</style>

<script>
    let timerInterval;
    let totalSeconds = 0;
    let isPaused = false;

    function startTimer() {
        if (!isPaused) {
            const h = parseInt(document.getElementById('hr').value) || 0;
            const m = parseInt(document.getElementById('min').value) || 0;
            const s = parseInt(document.getElementById('sec').value) || 0;
            totalSeconds = h * 3600 + m * 60 + s;
        }

        if (totalSeconds <= 0) return;

        // Переключаем видимость элементов
        document.getElementById('timerInputs').style.display = 'none';
        document.getElementById('timerDisplay').style.display = 'block';
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('resumeBtn').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'inline-block';

        isPaused = false;

timerInterval = setInterval(() => {
    totalSeconds--;
    updateTimerDisplay();

    if (totalSeconds <= 0) {
        clearInterval(timerInterval);
        
        // ВОТ ЭТА СТРОЧКА ЗАПУСКАЕТ ЗВУК
        document.getElementById('timerSound').play(); 
        
        alert("Время вышло!");
        resetTimer();
    }
}, 1000);
}

    function stopTimer() {
        clearInterval(timerInterval);
        isPaused = true;
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('resumeBtn').style.display = 'inline-block';
        document.getElementById('resetBtn').style.display = 'inline-block';
    }

    function resetTimer() {
        clearInterval(timerInterval);
        isPaused = false;
        totalSeconds = 0;
        document.getElementById('timerInputs').style.display = 'flex';
        document.getElementById('timerDisplay').style.display = 'none';
        document.getElementById('startBtn').style.display = 'inline-block';
        document.getElementById('resumeBtn').style.display = 'none';
        document.getElementById('stopBtn').style.display = 'none';
        document.getElementById('resetBtn').style.display = 'none';
        
        // Очистка инпутов
        document.getElementById('hr').value = '';
        document.getElementById('min').value = '';
        document.getElementById('sec').value = '';
    }

    function updateTimerDisplay() {
        const h = Math.floor(totalSeconds / 3600);
        const m = Math.floor((totalSeconds % 3600) / 60);
        const s = totalSeconds % 60;
        document.getElementById('timerDisplay').textContent = 
            `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }
	
	let swInterval;
let swStartTime;
let swElapsedTime = 0;
let flagCount = 0;

function startSW() {
	document.getElementById('swStartSound').play();
    swStartTime = Date.now() - swElapsedTime;
    
    document.getElementById('swStartBtn').style.display = 'none';
    document.getElementById('swResumeBtn').style.display = 'none';
    document.getElementById('swResetBtn').style.display = 'none';
    document.getElementById('swStopBtn').style.display = 'inline-block';
    document.getElementById('swFlagBtn').style.display = 'inline-block';

    swInterval = setInterval(() => {
        swElapsedTime = Date.now() - swStartTime;
        updateSWDisplay();
    }, 10);
}

function stopSW() {
    clearInterval(swInterval);
    document.getElementById('swStopBtn').style.display = 'none';
    document.getElementById('swFlagBtn').style.display = 'none';
    document.getElementById('swResumeBtn').style.display = 'inline-block';
    document.getElementById('swResetBtn').style.display = 'inline-block';
}

function resetSW() {
    clearInterval(swInterval);
    swElapsedTime = 0;
    flagCount = 0;
    updateSWDisplay();
    document.getElementById('flagLog').innerHTML = '';
    document.getElementById('swStartBtn').style.display = 'inline-block';
    document.getElementById('swResumeBtn').style.display = 'none';
    document.getElementById('swStopBtn').style.display = 'none';
    document.getElementById('swResetBtn').style.display = 'none';
    document.getElementById('swFlagBtn').style.display = 'none';
}

function addFlag() {
    flagCount++;
    const log = document.getElementById('flagLog');
    const timeStr = formatSWTime(swElapsedTime);
    
    const row = document.createElement('div');
    row.className = 'flag-row';
    const num = flagCount < 10 ? '0' + flagCount : flagCount;
    row.innerHTML = `<span class="flag-label">//FLAG_${num}</span><span class="flag-time">${timeStr}</span>`;
    
    log.prepend(row); // Новые флаги сверху
}

function updateSWDisplay() {
    document.getElementById('swDisplay').innerHTML = formatSWTime(swElapsedTime, true);
}

function formatSWTime(ms, withStyledMs = false) {
    let milliseconds = ms % 1000;
    let seconds = Math.floor((ms / 1000) % 60);
    let minutes = Math.floor((ms / (1000 * 60)) % 60);
    let hours = Math.floor((ms / (1000 * 60 * 60)) % 24);

    const h = hours > 0 ? String(hours).padStart(2, '0') + ':' : '';
    const m = String(minutes).padStart(2, '0');
    const s = String(seconds).padStart(2, '0');
    const msStr = String(milliseconds).padStart(3, '0');

    if (withStyledMs) {
        return `${h}${m}:${s}<span style="font-size: 30px; color: var(--accent);">.${msStr}</span>`;
    }
    return `${h}${m}:${s}.${msStr}`;
}

const API_KEY = '3394aab366a7e420e71eb1906cd085ac'; // <--- ВСТАВЬ КЛЮЧ СЮДА
const CITY = 'Sibay';

function updateWeather() {

    // Запрос к OpenWeatherMap (units=metric делает Цельсии, lang=ru делает описание на русском)
    fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${API_KEY}&units=metric&lang=ru`)
        .then(response => response.json())
        .then(data => {
            const temperature = Math.round(data.main.temp);
            // Берем описание и делаем его капсом в твоем стиле
            const description = data.weather[0].description.toUpperCase();
            
            // Добавляем плюс, если температура выше нуля
            document.getElementById('temp').textContent = `${temperature > 0 ? '+' : ''}${temperature}°C`;
            document.getElementById('weatherDesc').textContent = description;
        })
        .catch(err => {
            console.error("Weather error:", err);
            document.getElementById('weatherDesc').textContent = "OFFLINE";
        });
}

// Запускаем обновление при загрузке
updateWeather();
// Обновляем каждые 30 минут, чтобы не превышать лимиты бесплатного тарифа
setInterval(updateWeather, 1800000);

function getForismaticQuote() {
    const quoteElement = document.getElementById('quoteText');
    quoteElement.textContent = "// LOADING_DATA...";

    // Используем скрипт JSONP, так как Forismatic не поддерживает обычный fetch напрямую из браузера
    const script = document.createElement('script');
    script.src = "https://api.forismatic.com/api/1.0/?method=getQuote&format=jsonp&lang=ru&jsonp=parseQuote";
    document.body.appendChild(script);
    
    // Удаляем скрипт после загрузки, чтобы не засорять страницу
    script.onload = function() {
        this.remove();
    };
}

// Эта функция сработает, когда Forismatic пришлет ответ
function parseQuote(data) {
    const text = data.quoteText;
    const author = data.quoteAuthor || "Неизвестен";
    document.getElementById('quoteText').innerHTML = `«${text}»<br><span style="color: var(--accent); font-size: 14px; margin-top: 10px;">— ${author}</span>`;
}

	
</script>

		<div class="widget" id="w2">
			<div class="widget-title">// SYSTEM_STOPWATCH_v1.0</div>
			
			<div class="time-display" id="swDisplay">00:00:00<span style="font-size: 30px; color: var(--accent);">.000</span></div>
			
			<div class="timer-controls">
				<button id="swStartBtn" class="ctrl-btn" onclick="startSW()">//START.STOPWATCH</button>
				<button id="swStopBtn" class="ctrl-btn" style="display: none;" onclick="stopSW()">//STOP</button>
				<button id="swFlagBtn" class="ctrl-btn" style="display: none;" onclick="addFlag()">//FLAG</button>
				<button id="swResumeBtn" class="ctrl-btn" style="display: none;" onclick="startSW()">//PLAY</button>
				<button id="swResetBtn" class="ctrl-btn" style="display: none;" onclick="resetSW()">//RESET</button>
			</div>
		
			<div id="flagLog" class="flag-container"></div>
		</div>

<div class="widget" id="w3">
    <div class="widget-title">// WEATHER_DATA_v1.1</div>
    <div class="time-display" id="temp">--°C</div>
    <div class="date-display" id="weatherDesc">CONNECTING...</div>
    <div style="font-family: 'Share Tech Mono', monospace; font-size: 14px; color: #444; margin-top: 10px;">
        CITY: SIBAY // BASHKORTOSTAN
    </div>
</div>
	<div class="widget" id="w4">
    <div class="widget-title">// SYSTEM_QUOTES_v1.0</div>
    <div class="time-display" id="quoteText" style="font-size: 20px; min-height: 120px; padding: 20px; display: flex; align-items: center; justify-content: center; line-height: 1.4;">
        «But I still don't believe in anything.» by   Outlaw  -  1899 year
    </div>
    <div class="timer-controls">
        <button class="ctrl-btn" onclick="getForismaticQuote()">//GET.QUOTE</button>
    </div>
</div>

        <button class="nav-btn next" onclick="changeWidget(1)">&#10095;</button>

    </div> 
	
	<script>
        // Логика переключения виджетов
        let currentWidget = 0;
        const totalWidgets = 5;

        function changeWidget(step) {
            // Убираем активный класс у текущего
            document.getElementById(`w${currentWidget}`).classList.remove('active');
            
            // Считаем новый индекс (зацикливание)
            currentWidget = (currentWidget + step + totalWidgets) % totalWidgets;
            
            // Добавляем активный класс новому
            document.getElementById(`w${currentWidget}`).classList.add('active');
        }

        // Обновление времени
        function updateClock() {
            const now = new Date();
            
            // Время
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').textContent = `${h}:${m}:${s}`;
            
            // Дата
            const options = { day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('ru-RU', options);
        }

        setInterval(updateClock, 1000);
        updateClock();

        // Добавляем поддержку стрелок клавиатуры
        document.addEventListener('keydown', (e) => {
            if (e.key === "ArrowLeft") changeWidget(-1);
            if (e.key === "ArrowRight") changeWidget(1);
        });
    </script>
</body>
</html>
